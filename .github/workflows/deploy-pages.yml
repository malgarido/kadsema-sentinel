name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages on every
# push to main. Enable Pages in repo Settings → Pages → Source:
# "GitHub Actions". The demo deploys in LOCAL data mode (no backend,
# no secrets). For a live build, switch to the Netlify workflow and
# supply Supabase env vars as repository secrets.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Use Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build:pages
        env:
          VITE_DATA_MODE: local

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
